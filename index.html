<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HARIS AI - Gesture Control Engine</title>
    
    <!-- MediaPipe Links -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <!-- Three.js Import Map -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --bg-dark: #0a0a12;
            --panel-bg: rgba(16, 16, 28, 0.75);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: var(--bg-dark);
            font-family: 'Segoe UI', Roboto, sans-serif; color: #fff;
        }

        canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }

        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 100; display: flex;
            justify-content: center; align-items: center; font-size: 24px;
            letter-spacing: 4px; color: var(--neon-blue);
        }

        #ui-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; padding: 20px; box-sizing: border-box;
        }

        .interactive { pointer-events: auto; }

        .panel {
            background: var(--panel-bg); border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 12px; padding: 15px; backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        #header { display: flex; justify-content: space-between; align-items: center; }
        #status-panel { color: var(--neon-blue); font-weight: bold; letter-spacing: 1px; }
        #mode-display { color: var(--neon-purple); font-weight: bold; }

        #controls-sidebar { width: 300px; display: flex; flex-direction: column; gap: 15px; margin-top: 20px;}

        button {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 10px 15px; border-radius: 6px; cursor: pointer;
            font-weight: 600; transition: all 0.3s; width: 100%; text-align: left;
        }
        button:hover {
            background: rgba(0, 243, 255, 0.1); border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
        }

        .color-palette { display: flex; gap: 10px; margin-top: 5px; opacity: 0.3; pointer-events: none; transition: opacity 0.3s;}
        .color-btn { width: 30px; height: 30px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; padding: 0;}
        .color-btn.blue { background: #00f3ff; }
        .color-btn.green { background: #00ff41; }
        .color-btn.red { background: #ff0055; }
        .color-btn.purple { background: #bc13fe; }

        #cam-preview {
            position: absolute; bottom: 20px; right: 20px; width: 160px; height: 120px;
            border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); overflow: hidden;
            transform: scaleX(-1); /* Mirrors webcam preview locally */
        }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="loader">INITIALIZING CORE ENGINE...</div>

    <div id="ui-container">
        <!-- TOP BAR -->
        <div id="header" class="panel interactive" style="width: 100%;">
            <div><strong>HARIS AI</strong> • Gesture Intelligence</div>
            <div id="status-panel">AWAITING SIGNAL</div>
            <div id="mode-display">SYSTEM IDLE</div>
        </div>

        <!-- SIDEBAR CONTROLS -->
        <div id="controls-sidebar" class="panel interactive">
            <div>
                <label style="font-size: 12px; color: #aaa;">LOAD 3D OBJECT (.GLB)</label>
                <input type="file" id="file-input-glb" accept=".glb,.gltf" style="margin-top: 5px; width: 100%; color: #fff;">
            </div>
            <div>
                <label style="font-size: 12px; color: #aaa;">LOAD GALLERY IMAGES</label>
                <input type="file" id="file-input-img" accept="image/*" multiple style="margin-top: 5px; width: 100%; color: #fff;">
            </div>
            
            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); width: 100%;">

            <button id="btn-depth-toggle">🏔️ Enable 3D Depth</button>
            <button id="btn-holo-toggle">🔮 Holographic Mode</button>

            <div>
                <label style="font-size: 12px; color: #aaa;">HOLO LIGHT TUNING</label>
                <div class="color-palette" id="color-palette">
                    <button class="color-btn blue" data-color="blue"></button>
                    <button class="color-btn green" data-color="green"></button>
                    <button class="color-btn red" data-color="red"></button>
                    <button class="color-btn purple" data-color="purple"></button>
                </div>
            </div>

            <div>
                <label style="font-size: 12px; color: #aaa;">GLOBAL OPACITY</label>
                <input type="range" id="opacity-slider" min="0.1" max="1" step="0.05" value="1" style="width: 100%; accent-color: var(--neon-blue);">
            </div>
        </div>
    </div>

    <!-- WEBCAM COMPONENT -->
    <div id="cam-preview">
        <video id="input-video" playsinline autoplay muted></video>
    </div>

    <!-- Script Entry -->
    <script type="module" src="app.module.js"></script>
</body>
</html>
